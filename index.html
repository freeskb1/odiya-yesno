<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#FFF8F0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <title>너모야 - 친구를 얼마나 알고 있나요?</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: linear-gradient(180deg, #FFF8F0 0%, #FFFDFA 100%);
        background-attachment: fixed;
        color: #2D2317;
        font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, "Roboto", sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: contain;
      }
      input, select, textarea, button { font-family: inherit; }
      input { font-size: 16px; }
      button { cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-thumb { background: #D9C9A8; border-radius: 100px; }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      @keyframes pulseRing {
        0%, 100% { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0.4), 0 2px 6px rgba(29,158,117,0.2); }
        50% { box-shadow: 0 0 0 6px rgba(29, 158, 117, 0), 0 2px 6px rgba(29,158,117,0.2); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
